# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "aarch64-apple-darwin" },
]

[advisories]
version = 2
yanked = "warn"
# Unmaintained (not vulnerable) transitive crates pulled in via Tauri's
# dependency tree (tauri-utils → urlpattern → unic-*). We can't upgrade them
# without Tauri doing so upstream. These are maintenance advisories, not
# security vulnerabilities. Revisit when Tauri drops the unic-* chain.
ignore = [
    "RUSTSEC-2025-0075", # unic-char-range unmaintained
    "RUSTSEC-2025-0080", # unic-common unmaintained
    "RUSTSEC-2025-0081", # unic-char-property unmaintained
    "RUSTSEC-2025-0098", # unic-ucd-ident / related unic crate unmaintained
    "RUSTSEC-2025-0100", # unic-* unmaintained
    # `serial` (unmaintained, not vulnerable) is pulled transitively by
    # portable-pty for a serial-port feature we don't use (we only use the PTY).
    # No security impact; revisit if portable-pty drops it upstream.
    "RUSTSEC-2017-0008", # serial unmaintained (via portable-pty)
]

[licenses]
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    # Both permissive / public-domain-equivalent, from transitive deps.
    "Unlicense",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
